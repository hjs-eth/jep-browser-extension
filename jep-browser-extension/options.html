<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { padding: 20px; font-family: Arial, sans-serif; }
    label { display: block; margin: 10px 0; }
    input[type="number"] { width: 100px; margin-left: 10px; }
    button { padding: 8px 16px; background: #1976d2; color: white; border: none; border-radius: 4px; cursor: pointer; }
    #status { margin-top: 10px; color: green; }
  </style>
</head>
<body>
  <h1>JEP Guard 设置</h1>
  <label>
    高风险阈值 (USDC):
    <input type="number" id="threshold" min="0" step="10" value="100">
  </label>
  <label>
    <input type="checkbox" id="autoBlock"> 自动拦截高风险交易（不弹窗）
  </label>
  <button id="save">保存设置</button>
  <p id="status"></p>
  <script src="options.js"></script>
</body>
</html>
