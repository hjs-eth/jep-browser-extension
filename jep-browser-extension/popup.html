<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 300px; padding: 10px; font-family: Arial, sans-serif; }
    h2 { font-size: 16px; margin-top: 0; display: flex; align-items: center; gap: 5px; }
    .stats { background: #f5f5f5; padding: 10px; border-radius: 4px; margin-bottom: 10px; }
    .stat-item { display: flex; justify-content: space-between; margin: 5px 0; }
    .risk-high { color: #d32f2f; font-weight: bold; }
    .risk-low { color: #388e3c; }
    button { width: 100%; padding: 8px; margin-top: 5px; cursor: pointer; background: #1976d2; color: white; border: none; border-radius: 4px; }
    button:hover { background: #1565c0; }
  </style>
</head>
<body>
  <h2>🛡️ JEP Guard</h2>
  <div class="stats">
    <div class="stat-item">
      <span>已拦截风险交易:</span>
      <span id="blockedCount">0</span>
    </div>
    <div class="stat-item">
      <span>当前页面风险:</span>
      <span id="pageRisk" class="risk-low">低</span>
    </div>
  </div>
  <button id="viewLogs">查看审计日志</button>
  <button id="openSettings">设置</button>
  <script src="popup.js"></script>
</body>
</html>
